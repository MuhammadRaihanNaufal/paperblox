<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAPERBLOX</title>
    <link rel="icon" type="image/png" href="img/p.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        /* --- GLOBAL RESET & DARK MODE VARIABLES --- */
        * { box-sizing: border-box; }

        :root {
            --primary: #2C3E50; --accent: #5DADE2;  
            --bg: #F4F6F7; --white: #FFFFFF;
            --nav-height: 70px;
            --wa: #25D366; --wa-dark: #1da851;
            --ig: #E1306C; --tt: #000000;
        }

        body.dark-mode {
            --primary: #F4F6F7; --bg: #121212;      
            --white: #1E1E1E; --tt: #FFFFFF; 
        }

        html { scroll-behavior: smooth; scroll-padding-top: var(--nav-height); width: 100%; overflow-x: hidden; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg); color: var(--primary);
            line-height: 1.6; width: 100%; overflow-x: hidden;
            padding-top: var(--nav-height);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* --- [FITUR 7] PRELOADER CSS --- */
        #preloader {
            position: fixed; inset: 0; background: var(--bg); z-index: 100000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .loader-spinner {
            width: 60px; height: 60px; 
            border: 5px solid rgba(93, 173, 226, 0.2); border-top: 5px solid var(--accent); 
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- [FITUR 6] BACK TO TOP CSS --- */
        .back-to-top {
            position: fixed; bottom: 30px; right: 30px; 
            background: var(--accent); color: white; 
            width: 50px; height: 50px; border-radius: 50%; border: none; 
            font-size: 1.2rem; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); 
            z-index: 10000; opacity: 0; visibility: hidden; transform: translateY(20px); 
            transition: all 0.3s ease;
        }
        .back-to-top.show { opacity: 1; visibility: visible; transform: translateY(0); }
        .back-to-top:hover { background: var(--primary); transform: translateY(-5px); }

        /* --- [FITUR 2] TOAST NOTIFICATION CSS --- */
        .toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); 
            background: var(--wa); color: white; padding: 12px 25px; 
            border-radius: 30px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
            z-index: 10005; transition: bottom 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex; align-items: center; gap: 10px;
        }
        body.dark-mode .toast { background: var(--wa-dark); }
        .toast.show { bottom: 40px; }


        /* =========================================================
           PASTE KODE CSS NAVBAR, HERO, FEATURES, MENU, MODAL, CART 
           MILIKMU DI SINI (SAMA SEPERTI KODE REVISI SEBELUMNYA) 
           ========================================================= */
        
        nav { background: var(--white); height: var(--nav-height); padding: 0 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: fixed; top: 0; left: 0; right: 0; z-index: 9999; width: 100%; transition: background-color 0.3s ease; }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--primary); text-decoration: none; letter-spacing: 2px; }
        .nav-right-container { display: flex; align-items: center; gap: 15px; } 
        .nav-links { display: flex; align-items: center; gap: 20px; }
        .nav-links a { text-decoration: none; color: var(--primary); font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }
        .icon-btn { background: none; border: none; cursor: pointer; font-size: 1.3rem; color: var(--primary); padding: 5px; display: flex; transition: 0.2s; }
        .icon-btn:hover { color: var(--accent); transform: scale(1.1); }
        
        section { padding: 60px 8%; text-align: center; width: 100%; position: relative; }
        .section-title { font-size: 2.5rem; margin-bottom: 20px; position: relative; display: inline-block; }
        .section-title::after { content: ''; width: 60px; height: 4px; background: var(--accent); position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); }
        
        /* Dan seterusnya (CSS persis seperti balasan saya yang Dark Mode) */
        /* ... */

    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-spinner"></div>
        <h2 style="color: var(--primary); margin-top: 15px; letter-spacing: 3px;">PAPERBLOX</h2>
    </div>

    <button id="backToTop" class="back-to-top" onclick="window.scrollTo({top:0, behavior:'smooth'})" title="Kembali ke atas">
        <i class="fas fa-arrow-up"></i>
    </button>

    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i> <span id="toastMsg">Berhasil ditambahkan!</span>
    </div>

    <nav>
        <a href="#home" class="logo">PAPERBLOX</a>
        <div class="nav-right-container">
            <div class="nav-links" id="navLinks">
                <a href="#home">Home</a>
                <a href="#about">About</a>
                <a href="#katalog">Katalog</a>
                <a href="#pemesanan">Pemesanan</a>
                <a href="#team">Team</a>
            </div>
            <button class="icon-btn" id="darkModeBtn" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
            <button class="icon-btn" id="searchBtn"><i class="fas fa-search"></i></button>
            <button class="icon-btn" id="openCartBtn"><i class="fas fa-shopping-cart"></i></button>
        </div>
    </nav>

    <section class="hero" id="home">
        <div class="hero-content" data-aos="fade-right">
            <div id="digitalClock" class="digital-clock">Loading...</div>
            <h1>PAPERBLOX</h1>
            <p style="font-size: 1.1rem; letter-spacing: 12px; color: var(--accent);">Lipat Rekat Rakit</p>
            <a href="#pemesanan" class="btn">Explore Product</a>
        </div>
        <div class="hero-image" data-aos="fade-left">
            <img src="img/paperblox.jpg" alt="Papercraft Hero">
        </div>
    </section>

    <section class="features" id="about">
        <h2 class="section-title" data-aos="zoom-in">Kenapa Paperblox?</h2>
        <div class="features-grid">
            <div class="feature-card" data-aos="fade-up" data-aos-delay="0"><div style="font-size: 3rem;">💰</div><h3>Ramah Kantong</h3></div>
            <div class="feature-card" data-aos="fade-up" data-aos-delay="100"><div style="font-size: 3rem;">✂️</div><h3>Mudah & Seru</h3></div>
            <div class="feature-card" data-aos="fade-up" data-aos-delay="200"><div style="font-size: 3rem;">🧠</div><h3>Digital Detox</h3></div>
            <div class="feature-card" data-aos="fade-up" data-aos-delay="300"><div style="font-size: 3rem;">💎</div><h3>Kertas Premium</h3></div>
        </div>
    </section>

    <section id="pemesanan" class="pemesanan-section">
        <h2 class="section-title" data-aos="fade-up">Pemesanan</h2>
        
        <div class="menu-grid" id="menuGrid">
            <div class="menu-card" data-aos="fade-up" data-aos-delay="100">
                <div class="menu-img"><img src="img/naruto.png" alt="Uzumaki Naruto"></div>
                <div class="menu-info">
                    <h3>Uzumaki Naruto</h3>
                    <p class="desc">Ninja Konoha dengan semangat api.</p>
                    <div class="price-action">
                        <span class="price">Rp20.000</span>
                        <button class="add-btn" onclick="tambahKeKeranjang('Uzumaki Naruto')"><i class="fas fa-shopping-cart"></i></button>
                    </div>
                </div>
            </div>
            </div>
    </section>


    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        // INISIALISASI ANIMASI SCROLL (AOS)
        AOS.init({
            duration: 800, // Kecepatan animasi 0.8 detik
            offset: 100,   // Animasi jalan saat elemen berjarak 100px dari bawah layar
            once: true     // Animasi hanya jalan 1x (tidak mengulang saat di-scroll ke atas)
        });

        // [FITUR 7] MENGHILANGKAN PRELOADER SAAT HALAMAN SELESAI DIMUAT
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            preloader.style.opacity = '0';
            setTimeout(() => {
                preloader.style.visibility = 'hidden';
            }, 500);
        });

        // [FITUR 6] MEMUNCULKAN TOMBOL BACK TO TOP SAAT DI-SCROLL KE BAWAH
        window.addEventListener('scroll', () => {
            const backToTop = document.getElementById('backToTop');
            if (window.scrollY > 400) {
                backToTop.classList.add('show');
            } else {
                backToTop.classList.remove('show');
            }
        });

        // [FITUR 2] FUNGSI MEMUNCULKAN TOAST NOTIFICATION
        function showToast(namaProduk) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            
            toastMsg.innerText = `${namaProduk} masuk keranjang!`;
            toast.classList.add('show');
            
            // Hilangkan otomatis setelah 3 detik
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // --- CONTOH INTEGRASI TOAST DI DALAM FUNGSI CART ---
        // PENTING: Panggil fungsi `showToast` di dalam fungsi Add to Cart JavaScript milikmu
        function tambahKeKeranjang(namaProduk) {
            // (Logika push array cart aslimu di sini)
            
            // Panggil toast-nya
            showToast(namaProduk);
            
            // Update angka keranjang
            document.getElementById('cartCount').innerText = parseInt(document.getElementById('cartCount').innerText) + 1;
        }

        // ==========================================
        // PASTE SISA JAVASCRIPT ASLIMU DI BAWAH INI
        // (Swiper, Dark Mode Toggle, Logika WA, dll)
        // ==========================================
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }
    </script>
</body>
</html>
